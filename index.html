<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="referrer" content="no-referrer" />
  <meta name="theme-color" content="#D9543B" />
  <link rel="icon" href="data:," />
  <title>本日の出店状況｜ランチネット</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrap">
    <header class="masthead">
      <img class="brand-logo" src="logo.png" alt="ランチネット" width="626" height="131" />
      <h1 class="title">本日の出店状況</h1>
      <p class="datebar" id="datebar">読み込んでいます…</p>
    </header>

    <p class="fav-hint">
      <span class="fav-hint-line">
        <svg class="fav-hint-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
        タップでお気に入りに追加
      </span>
      <span class="fav-hint-sub">よく行くお店を上にまとめます</span>
    </p>

    <main id="board" aria-live="polite">
      <p class="loading">少々お待ちください…</p>
    </main>

    <footer class="footer">
      <p class="line-note">※ご不明な点はランチネット本店(<a href="tel:0455936656" class="tel">045-593-6656</a>)までお問い合わせください</p>
    </footer>
  </div>

  <!-- 状態ごとのテンプレート（JSが複製して使う） -->
  <template id="tpl-list">
    <ul class="loc-list"></ul>
    <p class="legend">
      <span class="dot dot-open" aria-hidden="true"></span>出店予定
      <span class="legend-gap"></span>
      <span class="dot dot-soldout" aria-hidden="true"></span>完売
      <span class="legend-gap"></span>
      <span class="dot dot-closed" aria-hidden="true"></span>本日お休み
    </p>
  </template>

  <template id="tpl-loc-row">
    <li class="loc-row">
      <button type="button" class="fav-btn" aria-pressed="false">
        <svg class="fav-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
        <span class="visually-hidden">お気に入り</span>
      </button>
      <span class="loc-name"></span>
      <span class="loc-status">
        <span class="dot" aria-hidden="true"></span>
        <span class="loc-status-text"></span>
      </span>
    </li>
  </template>

  <template id="tpl-message">
    <div class="message">
      <div class="message-mark" aria-hidden="true"></div>
      <p class="message-head"></p>
      <p class="message-body"></p>
    </div>
  </template>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
